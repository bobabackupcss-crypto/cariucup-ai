<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CariUcup BY NZR</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#0f172a;
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
width:100%;
max-width:900px;
}

.logo{
text-align:center;
font-size:48px;
font-weight:bold;
margin-bottom:10px;
}

.logo span{
color:#3b82f6;
}

.subtitle{
text-align:center;
color:#94a3b8;
margin-bottom:40px;
}

.search-box{
background:#1e293b;
border:1px solid #334155;
border-radius:20px;
padding:10px;
display:flex;
gap:10px;
}

.search-box input{
flex:1;
background:none;
border:none;
outline:none;
color:white;
font-size:18px;
padding:10px;
}

.search-box button{
background:#2563eb;
border:none;
color:white;
padding:12px 20px;
border-radius:12px;
cursor:pointer;
font-weight:bold;
}

.search-box button:hover{
background:#1d4ed8;
}

.result{
margin-top:30px;
background:#1e293b;
padding:20px;
border-radius:15px;
line-height:1.7;
display:none;
}

.loading{
text-align:center;
margin-top:20px;
display:none;
}

.footer{
text-align:center;
margin-top:20px;
color:#64748b;
font-size:14px;
}

@media(max-width:600px){
.logo{
font-size:32px;
}

.search-box{
flex-direction:column;
}
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
Cari<span>Ucup</span> AI
</div>

<div class="subtitle">
Tanyakan apa saja kepada AI
</div>

<div class="search-box">
<input
id="question"
type="text"
placeholder="Contoh: Siapa presiden pertama Indonesia?"
>
<button onclick="searchAI()">
Cari
</button>
</div>

<div class="loading" id="loading">
⏳ Sedang mencari jawaban...
</div>

<div class="result" id="result"></div>

<div class="footer">
Powered by Cloudflare Workers
</div>

</div>

<script>

const WORKER_URL =
"https://bobatoto.bobabackupcss.workers.dev/";

async function searchAI(){

const q =
document.getElementById("question").value.trim();

if(!q) return;

document.getElementById("loading").style.display="block";
document.getElementById("result").style.display="none";

try{

const res = await fetch(WORKER_URL,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
query:q
})
});

const data = await res.json();

document.getElementById("result").innerHTML=
`
<h2>Jawaban AI</h2>
<br>
${data.answer.replace(/\n/g,"<br>")}
`;

document.getElementById("result").style.display="block";

}catch(err){

document.getElementById("result").innerHTML=
"Terjadi kesalahan: "+err.message;

document.getElementById("result").style.display="block";
}

document.getElementById("loading").style.display="none";
}

document
.getElementById("question")
.addEventListener("keypress",function(e){
if(e.key==="Enter"){
searchAI();
}
});

</script>

</body>
</html>
